<!DOCTYPE html>
<html>
<head>
  <title>Chat2Calendar</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }
    h2 {
      color: #333;
    }
    input {
      padding: 12px;
      width: 300px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      padding: 12px 20px;
      margin-left: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

<h2>🚀 Chat2Calendar</h2>

<input type="text" id="msg" placeholder="Enter your task..." />
<button onclick="send()">Create Event</button>

<script>
async function send() {
  const message = document.getElementById("msg").value;

  try {
    const response = await fetch("https://geethal.app.n8n.cloud/webhook/whatsapp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        body: {
          Body: message
        }
      })
    });

    if (response.ok) {
      alert("✅ Event created successfully!");
    } else {
      alert("❌ Failed to create event");
    }

  } catch (error) {
    alert("❌ Error: " + error.message);
  }
}
</script>

</body>
</html>
