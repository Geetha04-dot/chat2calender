<!DOCTYPE html>
<html>
<head>
  <title>Chat2Calendar</title>
</head>
<body>

<h2>Chat2Calendar</h2>

<input type="text" id="msg" placeholder="Enter your task" />
<button onclick="send()">Create Event</button>

<script>
function send() {
  const message = document.getElementById("msg").value;

  fetch("https://geethal.app.n8n.cloud/webhook/whatsapp", {
    method: "POST",
    mode: "no-cors",   // ⭐ IMPORTANT
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      body: {
        Body: message
      }
    })
  });

  alert("✅ Event Created!");
}
  
</script>

</body>
</html>
